    x-displayName: Категории, предметы и характеристики
    description: ''
  - name: Создание карточек товаров
    x-displayName: Создание карточек товаров
    description: ''
  - name: Карточки товаров
    x-displayName: Карточки товаров
    description: ''
  - name: Медиафайлы
    x-displayName: Медиафайлы
    description: ''
  - name: Ярлыки
    x-displayName: Ярлыки
    description: ''
  - name: Рекомендации
    x-displayName: Рекомендации
    description: ''
  - name: Цены и скидки
    description: ''
  - name: Склады продавца
    description: ''
  - name: Остатки на складах продавца
    description: ''
paths:
  /content/v2/object/parent/all:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    get:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Родительские категории товаров
      description: |
        Метод возвращает названия и ID всех родительских категорий для [создания карточек товаров](/openapi/work-with-products#tag/listingItems): например, `Электроника`, `Бытовая химия`, `Рукоделие`.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/introduction/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца для всех методов категории <strong>Контент</strong>:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 мин | 100 запросов | 600 мс | 5 запросов |

        Исключение — методы:

        <ul>
            <li><a href="/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload/post">создания карточек товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload~1add/post">создания карточек товаров с присоединением</a></li>
            <li><a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post">редактирования карточек товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1recover/post">восстановления карточек товаров из корзины</a></li>
            <li><a href="/openapi/work-with-products#tag/recommendations/operation/postV1RecommendationsList">получения списка рекомендаций в карточках товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/recommendations/operation/postV1RecommendationsSet">установки рекомендаций для товаров</a></li>
        </ul>
        </div>
      tags:
        - Категории, предметы и характеристики
      parameters:
        - name: locale
          in: query
          description: |
            Язык поля ответа `name`:
              - `ru` — русский
              - `en` — английский
              - `zh` — китайский

            Не используется в песочнице. Данные песочницы возвращаются только на русском языке
          schema:
            type: string
            example: en
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    items:
                      type: object
                      properties:
                        name:
                          description: Название категории
                          type: string
                          example: Электроника
                        id:
                          description: ID родительской категории
                          type: integer
                          example: 479
                        isVisible:
                          description: Виден на сайте
                          type: boolean
                          example: true
                  error:
                    description: Флаг наличия ошибки
                    type: boolean
                    example: false
                  errorText:
                    description: Описание ошибки
                    type: string
                    example: ''
                  additionalErrors:
                    description: Дополнительные ошибки
                    nullable: true
                    type: string
                    example: ''
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError403'
        '429':
          $ref: '#/components/responses/429'
  /content/v2/object/all:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    get:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Список предметов
      description: |
        Метод возвращает список названий [родительских категорий предметов](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1parent~1all/get) и их предметов с ID. Например, у категории `Игрушки` будут предметы `Калейдоскопы`, `Куклы`, `Мячики`.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/introduction/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца для всех методов категории <strong>Контент</strong>:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 мин | 100 запросов | 600 мс | 5 запросов |

        Исключение — методы:

        <ul>
            <li><a href="/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload/post">создания карточек товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload~1add/post">создания карточек товаров с присоединением</a></li>
            <li><a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post">редактирования карточек товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1recover/post">восстановления карточек товаров из корзины</a></li>
            <li><a href="/openapi/work-with-products#tag/recommendations/operation/postV1RecommendationsList">получения списка рекомендаций в карточках товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/recommendations/operation/postV1RecommendationsSet">установки рекомендаций для товаров</a></li>
        </ul>
        </div>
      tags:
        - Категории, предметы и характеристики
      parameters:
        - name: locale
          in: query
          schema:
            type: string
            example: en
          description: |
            Язык полей ответа:
              - `ru` — русский
              - `en` — английский
              - `zh` — китайский

            Не используется в песочнице. Данные песочницы возвращаются только на русском языке
        - name: name
          in: query
          schema:
            type: string
            example: Носки
          description: Поиск по названию предмета (Носки), поиск работает по подстроке, искать можно на любом из поддерживаемых языков
        - name: limit
          in: query
          schema:
            type: integer
            example: 1000
            default: 30
          description: Количество предметов, максимум 1000
        - name: offset
          in: query
          schema:
            type: integer
            example: 5000
            default: 0
          description: Сколько элементов пропустить. Например, для значения `10` ответ начнется с 11 элемента
        - name: parentID
          in: query
          schema:
            type: integer
            example: 1000
          description: ID родительской категории предмета
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Предметы
                    items:
                      type: object
                      properties:
                        subjectID:
                          type: integer
                          description: ID предмета
                        parentID:
                          type: integer
                          description: ID родительской категории
                        subjectName:
                          type: string
                          description: Название предмета
                        parentName:
                          type: string
                          description: Название родительской категории
                  error:
                    type: boolean
                    description: Флаг наличия ошибки
                  errorText:
                    type: string
                    description: Текст ошибки
                  additionalErrors:
                    nullable: true
                    description: Дополнительные ошибки
                    type: string
              example:
                data:
                  - subjectID: 2560
                    parentID: 479
                    subjectName: 3D очки
                    parentName: Электроника
                  - subjectID: 1152
                    parentID: 858
                    subjectName: 3D-принтеры
                    parentName: Оргтехника
                error: false
                errorText: ''
                additionalErrors: null
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /content/v2/object/charcs/{subjectId}:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    get:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Характеристики предмета
      description: |
        Метод возвращает параметры характеристик предмета: названия, типы данных, единицы измерения и так далее. В запросе необходимо указать ID [предмета](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1all/get).

        <div class="description_important">
          Для получения значений характеристик <a href="/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1directory~1colors/get">Цвет</a>, <a href="/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1directory~1kinds/get">Пол</a>, <a href="/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1directory~1countries/get">Страна производства</a>, <a href="/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1directory~1seasons/get">Сезон</a>, <a href="/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1directory~1vat/get">Ставка НДС</a> и <a href="/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1directory~1tnved/get">ТНВЭД-код</a> используйте отдельные методы
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/introduction/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца для всех методов категории <strong>Контент</strong>:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 мин | 100 запросов | 600 мс | 5 запросов |

        Исключение — методы:

        <ul>
            <li><a href="/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload/post">создания карточек товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload~1add/post">создания карточек товаров с присоединением</a></li>
            <li><a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post">редактирования карточек товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/listings/paths/~1content~1v2~1cards~1recover/post">восстановления карточек товаров из корзины</a></li>
            <li><a href="/openapi/work-with-products#tag/recommendations/operation/postV1RecommendationsList">получения списка рекомендаций в карточках товаров</a></li>
            <li><a href="/openapi/work-with-products#tag/recommendations/operation/postV1RecommendationsSet">установки рекомендаций для товаров</a></li>
        </ul>
        </div>
      tags:
        - Категории, предметы и характеристики
      parameters:
        - name: subjectId
          in: path
          required: true
          description: ID предмета
          schema:
            type: integer
            example: 105
        - name: locale
          in: query
          description: |
            Язык полей ответа `subjectName` и `name`:
              - `ru` — русский
              - `en` — английский
              - `zh` — китайский

            Не используется в песочнице. Данные песочницы возвращаются только на русском языке
          schema:
            type: string
            example: en
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Данные
                    items:
                      type: object
                      properties:
                        charcID:
                          type: integer
                          description: ID характеристики
                        subjectName:
                          type: string
                          description: Название предмета
                        subjectID:
                          type: integer
                          description: ID предмета
                        name:
                          type: string
                          description: Название характеристики
                        required:
                          type: boolean
                          description: |
                            - `true` — характеристику необходимо обязательно указать в карточке товара
                            - `false` — характеристику необязательно указывать
                        unitName:
                          type: string
                          description: Единица измерения
                        maxCount:
                          type: integer
                          description: |
                            Максимальное количество значений, которое можно присвоить характеристике при [создании](./work-with-products#tag/listingItems) или [редактировании](./work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post) карточек товаров.
                            <br>
                            Используется только для характеристик с `"charcType":1` — массив строк.
                            <br>
                            Характеристикам с `"charcType":4` — число, можно присвоить только одно значение.
                            <br><br>
                            Если `"maxCount":0`, количество значений не ограничено
                        popular:
                          description: Характеристика популярна у пользователей (true - да, false - нет)
                          type: boolean
                        charcType:
                          type: integer
                          description: |
                            Тип данных характеристики, который необходимо использовать при [создании](./work-with-products#tag/listingItems) или [редактировании](./work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post) карточек товаров:
                              -  `1` — массив строк
                              -  `4` — число (целое либо с десятичной дробью)
                              -  `0` — характеристика не используется
                        hasFilter:
                          type: boolean
                          description: |
                            Ключевая характеристика. Является ли характеристика значимой для покупателей:
                              - `true` — да
                              - `false` — нет
                        isVariable:
                          type: boolean
                          description: |
                            Признак [меняющейся характеристики](/knowledge-base/articles/019d49a4-1320-71bb-9dac-8ba07e7177ce/rabota-s-tovarami#obuedinenie-i-razuedinenie-kartochek-tovarov). Значение размечает характеристики, по которым варианты отличаются друг от друга:
                              -  `true` — варианты товара отличаются по этой характеристике
                              -  `false` — варианты товара не отличаются по этой характеристике
                        existNamedField:
                          type: boolean
                          description: "Как передать характеристику в запросах на\_[cоздание](./work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload/post),\_[создание с присоединением](./work-with-products#tag/listingItems/paths/~1content~1v2~1cards~1upload~1add/post)\_и\_[редактирование](./work-with-products#tag/listings/paths/~1content~1v2~1cards~1update/post) карточек товара:\n  -  `true` — в соответствующем параметре запроса\n  -  `false` — внутри массива `characteristics`\n"
                  error:
                    type: boolean
                    description: Флаг наличия ошибки
                  errorText:
                    type: string
                    description: Текст ошибки
                  additionalErrors:
                    type: string
                    description: Дополнительные ошибки
                    nullable: true
                example:
                  data:
                    - charcID: 54337
                      subjectName: Кроссовки
                      subjectID: 105
                      name: Размер
                      required: false
                      unitName: см
                      maxCount: 0
                      popular: false
                      charcType: 4
                      hasFilter: true
                      isVariable: true
                      existNamedField: true
                  error: false
                  errorText: ''
                  additionalErrors: null
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError403'
        '429':
          $ref: '#/components/responses/429'
  /content/v2/directory/colors:
    servers:
      - url: https://content-api.wildberries.ru
        description: |
          **Prod**
      - url: https://content-api-sandbox.wildberries.ru
        description: |
          **Sandbox**
    get:
      x-readonly-method: true
      x-category: content
      security:
        - HeaderApiKey: []
      summary: Цвет
      description: |
        Метод возвращает возможные значения [характеристики](/openapi/work-with-products#tag/categoriesSubcategoriesAndCharacteristics/paths/~1content~1v2~1object~1charcs~1%7BsubjectId%7D/get) предмета `Цвет`.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/introduction/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца для методов <strong>Характеристик</strong>:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 мин | 100 запросов | 600 мс | 5 запросов |
        | Сервисный | 1 мин | 100 запросов | 600 мс | 5 запросов |
        | Базовый с секретом | 1 мин | 100 запросов | 600 мс | 5 запросов |
        | Базовый | 1 ч | 2 запроса | 30 мин | 1 запрос |

        </div>
      tags:
        - Категории, предметы и характеристики
      parameters:
        - name: locale
          in: query
          description: |
            Язык полей ответа `subjectName` и `name`:
              - `ru` — русский
              - `en` — английский
              - `zh` — китайский

            Не используется в песочнице. Данные песочницы возвращаются только на русском языке
          schema:
            type: string
            example: en
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    items:
                      type: object
                      properties:
                        name:
                          description: Наименование цвета
                          type: string
                          example: персиковый мелок
                        parentName:
                          description: Наименование родительского цвета
                          type: string
                          example: оранжевый
                  error:
                    description: Флаг ошибки
                    type: boolean
                    example: false
                  errorText:
                    description: Описание ошибки
                    type: string
                    example: ''
                  additionalErrors:
                    description: Дополнительные ошибки
                    nullable: true
                    type: string
                    example: ''
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseBodyContentError400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Доступ запрещён
          content:
            application/json:
              schema:
